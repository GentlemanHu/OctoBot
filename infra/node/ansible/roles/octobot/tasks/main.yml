---
- name: Render docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ stack_deploy_dir }}/docker-compose.yml"
    owner: deploy
    group: deploy
    mode: "0644"
  notify: restart stack
  no_log: true

- name: Render .env
  ansible.builtin.template:
    src: env.j2
    dest: "{{ stack_deploy_dir }}/.env"
    owner: deploy
    group: deploy
    mode: "0600"
  notify: restart octobot
  no_log: true

- name: Render nginx.conf
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ stack_deploy_dir }}/nginx.conf"
    owner: deploy
    group: deploy
    mode: "0644"
  notify: restart nginx
  when: enable_nginx | default(false) | bool

- name: Copy Tor proxy Dockerfile
  ansible.builtin.copy:
    src: tor-proxy/
    dest: "{{ stack_deploy_dir }}/tor-proxy/"
    owner: deploy
    group: deploy
    mode: "0644"
  notify: restart tor
  when: enable_tor | default(false) | bool

- name: Generate self-signed TLS certificate
  ansible.builtin.command:
    cmd: >-
      openssl req -x509 -nodes -newkey rsa:2048 -days 3650
      -keyout {{ stack_deploy_dir }}/origin.key
      -out {{ stack_deploy_dir }}/origin.crt
      -subj "/CN={{ inventory_hostname | regex_replace('[^a-zA-Z0-9.\\-]', '') }}"
    creates: "{{ stack_deploy_dir }}/origin.crt"
  notify: restart nginx
  when: enable_nginx | default(false) | bool

- name: Pull Docker images
  ansible.builtin.command:
    cmd: docker compose pull --ignore-buildable --ignore-pull-failures
    chdir: "{{ stack_deploy_dir }}"
  changed_when: false

- name: Build and start stack
  ansible.builtin.command:
    cmd: docker compose up -d --build
    chdir: "{{ stack_deploy_dir }}"
  changed_when: false

- name: Flush handlers before health check
  ansible.builtin.meta: flush_handlers

- name: Install custom tentacles
  ansible.builtin.include_tasks: tentacles.yml
  when: custom_tentacles_zip | default('') | length > 0

- name: Run health checks
  ansible.builtin.include_tasks: healthcheck.yml
