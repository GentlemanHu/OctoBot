---
# Docker images (pinned to docker.io registry)
octobot_image: "docker.io/drakkarsoftware/octobot"
octobot_image_tag: "stable"
nginx_image: "docker.io/nginx:1-alpine"
postgres_image: "docker.io/postgres:16-alpine"

# Deployment
stack_deploy_dir: "/opt/octobot-node"
octobot_node_port: 8000
octobot_web_port: 5001
octobot_mem_limit: "2g"
nginx_port: 80
nginx_ssl_port: 443
nginx_mem_limit: "256m"
tor_mem_limit: "256m"

# Feature flags
enable_hardening: false
enable_tor: false
enable_replica_mode: false
enable_nginx: false
expose_web_ui: false
disable_telemetry: false
custom_tentacles_zip: ""
additional_tentacles_package_url: ""
install_default_tentacles: true

# PostgreSQL
postgres_db: "octobot_node"
postgres_user: "octobot"
postgres_mem_limit: "2g"

# Secrets — override in inventories/<env>/group_vars/all/vars.yml or pass via --extra-vars
secret_key: ""
admin_username: "admin@example.com"
admin_password: ""
postgres_password: ""

# Task encryption (optional)
tasks_inputs_rsa_private_key: ""
tasks_inputs_ecdsa_public_key: ""
tasks_outputs_rsa_public_key: ""
tasks_outputs_ecdsa_private_key: ""
tasks_inputs_rsa_public_key: ""
tasks_inputs_ecdsa_private_key: ""
tasks_outputs_rsa_private_key: ""
tasks_outputs_ecdsa_public_key: ""

# Firewall (geerlingguy.firewall)
firewall_allowed_tcp_ports:
  - "22"
  - "80"
  - "443"

# Docker (geerlingguy.docker)
docker_install_compose_plugin: true
docker_users:
  - deploy

# devsec.hardening overrides
os_auditd_enabled: false
os_selinux_enabled: false
ssh_permit_root_login: "no"
ssh_server_password_login: false
ssh_max_auth_retries: 3
ssh_allow_tcp_forwarding: "no"
ssh_x11_forwarding: false

# Nginx security is handled in the nginx.conf.j2 template (TLS 1.2+, security
# headers, rate limiting, server_tokens off) since nginx runs in a Docker container.
