---
# Full stack rolling deploy — master nodes first (Postgres must be up before consumers)

- name: Validate inventory topology
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Fail if more than one master node
      ansible.builtin.assert:
        that:
          - groups['master_nodes'] | default([]) | length <= 1
        fail_msg: >-
          At most one master node is supported.
          Found {{ groups['master_nodes'] | default([]) | length }}.

    - name: Fail if replica mode enabled but no consumers
      ansible.builtin.assert:
        that:
          - groups['consumer_nodes'] | default([]) | length > 0
        fail_msg: >-
          Replica mode requires at least one consumer node.
          Add hosts to the consumer_nodes group.
      when:
        - groups['master_nodes'] | default([]) | length == 1
        - enable_replica_mode | default(false) | bool

    - name: Fail if consumer nodes defined without replica mode
      ansible.builtin.assert:
        that:
          - groups['consumer_nodes'] | default([]) | length == 0
        fail_msg: >-
          Consumer nodes require enable_replica_mode: true.
          Set it in group_vars or remove consumer nodes.
      when: not (enable_replica_mode | default(false) | bool)

- name: Deploy OctoBot Master Nodes
  hosts: master_nodes
  serial: 1
  max_fail_percentage: 0
  become: true

  roles:
    - geerlingguy.firewall
    - geerlingguy.docker
    - role: devsec.hardening.os_hardening
      when: enable_hardening | default(false)
    - role: devsec.hardening.ssh_hardening
      when: enable_hardening | default(false)
    - common
    - octobot
    # NOTE: devsec.hardening.nginx_hardening is NOT used here because nginx runs
    # inside a Docker container. Security hardening (TLS 1.2+, security headers,
    # rate limiting, server_tokens off) is applied via the nginx.conf.j2 template.

  post_tasks:
    - name: Pause between nodes
      ansible.builtin.pause:
        seconds: 10
      when: ansible_play_hosts_all | length > 1

- name: Deploy OctoBot Consumer Nodes
  hosts: consumer_nodes
  serial: 1
  max_fail_percentage: 0
  become: true

  roles:
    - geerlingguy.firewall
    - geerlingguy.docker
    - role: devsec.hardening.os_hardening
      when: enable_hardening | default(false)
    - role: devsec.hardening.ssh_hardening
      when: enable_hardening | default(false)
    - role: postgres
      when: enable_replica_mode | default(false)
    - common
    - octobot

  post_tasks:
    - name: Pause between nodes
      ansible.builtin.pause:
        seconds: 10
      when: ansible_play_hosts_all | length > 1
